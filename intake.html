<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efficio — Pre-Meeting Questionnaire</title>
  <meta name="description" content="Help us prepare for your consultation by filling out this quick questionnaire." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%237c3aed'/><text x='50' y='72' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>E</text></svg>">
  <style>
    :root {
      --bg: #050a16;
      --bg2: #07101f;
      --surf: #0f1e33;
      --surf2: #132540;
      --purple: #7c3aed;
      --purple2: #a855f7;
      --purple3: #c084fc;
      --white: #f8fafc;
      --text: #94a3b8;
      --muted: #64748b;
      --bd: rgba(124,58,237,.18);
      --bd2: rgba(168,85,247,.28);
      --glow: rgba(124,58,237,.38);
      --glow2: rgba(168,85,247,.2);
      --r: 8px;
      --r2: 14px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      min-height: 100vh;
    }

    .page-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo-mark {
      width: 38px; height: 38px;
      border-radius: var(--r);
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      box-shadow: 0 0 24px var(--glow), 0 0 48px var(--glow2);
    }
    .logo-text {
      font-size: 18px; font-weight: 800; color: var(--white);
      letter-spacing: -0.02em;
    }

    /* Header */
    h1 {
      font-size: 28px; font-weight: 800; color: var(--white);
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 15px; color: var(--muted); margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Form card */
    .form-card {
      background: var(--surf);
      border: 1px solid var(--bd);
      border-radius: var(--r2);
      padding: 36px 32px;
    }

    /* Fields */
    .field { margin-bottom: 24px; }
    .field:last-of-type { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px; font-weight: 600; color: var(--white);
      margin-bottom: 6px; letter-spacing: 0.01em;
    }
    .label-note {
      font-size: 12px; font-weight: 400; color: var(--muted);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="url"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--glow2);
    }
    select { cursor: pointer; }
    select option { background: var(--bg2); color: var(--white); }
    textarea { resize: vertical; min-height: 90px; }

    /* Checkboxes */
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .checkbox-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text); cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--purple);
      cursor: pointer;
    }

    /* Submit */
    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px 24px;
      margin-top: 32px;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: var(--r);
      font-size: 15px; font-weight: 700; color: #fff;
      cursor: pointer;
      box-shadow: 0 0 20px var(--glow2);
      transition: all 0.2s;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 36px var(--glow), 0 8px 24px rgba(124,58,237,0.25);
    }

    /* Thank you overlay */
    .thank-you {
      display: none;
      text-align: center;
      padding: 60px 32px;
    }
    .thank-you.visible { display: block; }
    .thank-you h2 {
      font-size: 24px; font-weight: 800; color: var(--white);
      margin-bottom: 12px;
    }
    .thank-you p {
      font-size: 15px; color: var(--text); max-width: 440px;
      margin: 0 auto; line-height: 1.7;
    }
    .check-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; color: #fff;
    }

    @media (max-width: 640px) {
      .page-wrapper { padding: 32px 16px 60px; }
      .form-card { padding: 24px 18px; }
      h1 { font-size: 22px; }
      .checkbox-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="logo">
      <div class="logo-mark">E</div>
      <div class="logo-text">Efficio</div>
    </div>

    <h1>Pre-Meeting Questionnaire</h1>
    <p class="subtitle">Thanks for booking a meeting with us. This helps us prepare for our meeting so we can make the most of your time.</p>

    <div class="form-card" id="formCard">
      <form name="intake" method="POST" data-netlify="true" id="intakeForm">
        <input type="hidden" name="form-name" value="intake" />

        <div class="field">
          <label for="company">Company Name</label>
          <input type="text" id="company" name="company" required placeholder="Your company name" />
        </div>

        <div class="field">
          <label for="name">Your Name and Title</label>
          <input type="text" id="name" name="name" required placeholder="e.g. John Smith, Owner" />
        </div>

        <div class="field">
          <label for="industry">Industry</label>
          <select id="industry" name="industry" required>
            <option value="" disabled selected>Select your industry</option>
            <option value="HVAC">HVAC</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Roofing">Roofing</option>
            <option value="Electrical">Electrical</option>
            <option value="Landscaping">Landscaping</option>
            <option value="Cleaning">Cleaning</option>
            <option value="General Contracting">General Contracting</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="field">
          <label for="employees">How Many Employees?</label>
          <input type="number" id="employees" name="employees" placeholder="e.g. 12" min="1" />
        </div>

        <div class="field">
          <label for="revenue">Current Monthly Revenue Range</label>
          <select id="revenue" name="revenue">
            <option value="" disabled selected>Select a range</option>
            <option value="Under $50K">Under $50K</option>
            <option value="$50K-$100K">$50K - $100K</option>
            <option value="$100K-$250K">$100K - $250K</option>
            <option value="$250K-$500K">$250K - $500K</option>
            <option value="$500K+">$500K+</option>
          </select>
        </div>

        <div class="field">
          <label>How Do You Currently Get New Customers?</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Referrals" /> Referrals</label>
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Google Ads" /> Google Ads</label>
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Social Media" /> Social Media</label>
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Door-to-door" /> Door-to-door</label>
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Cold calling" /> Cold calling</label>
            <label class="checkbox-item"><input type="checkbox" name="channels" value="Other" /> Other</label>
          </div>
        </div>

        <div class="field">
          <label for="challenge">What's Your Biggest Challenge Right Now?</label>
          <textarea id="challenge" name="challenge" placeholder="Tell us what's holding your business back..."></textarea>
        </div>

        <div class="field">
          <label for="customers_target">How Many New Customers Do You Want Per Month?</label>
          <input type="number" id="customers_target" name="customers_target" placeholder="e.g. 20" min="1" />
        </div>

        <div class="field">
          <label for="website">Website URL</label>
          <input type="url" id="website" name="website" placeholder="https://yourcompany.com" />
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" />
        </div>

        <div class="field">
          <label for="notes">Anything Else You'd Like Us to Know?</label>
          <textarea id="notes" name="notes" placeholder="Optional — any additional context for our meeting"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Questionnaire</button>
      </form>
    </div>

    <div class="thank-you" id="thankYou">
      <div class="check-icon">&#10003;</div>
      <h2>Thank You</h2>
      <p>Your responses have been submitted. We will review everything before our meeting so we can hit the ground running. See you soon.</p>
    </div>
  </div>

  <script>
    document.getElementById('intakeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(data).toString()
      }).then(function() {
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('thankYou').classList.add('visible');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }).catch(function() {
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('thankYou').classList.add('visible');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
