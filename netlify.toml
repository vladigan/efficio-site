# Efficio.tech — Netlify Deployment Config
# Deploy: Netlify Dashboard → Sites → "Add new site" → drag-and-drop website/ folder
# OR connect via GitHub and set publish directory to "website"

[build]
  # Set to "." if you drag-drop the website/ folder directly.
  # Set to "website" if deploying from the repo root via GitHub.
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ─── Redirects ────────────────────────────────────────────────────────────────

# Book / Audit shortcuts → Calendly directly
# /book — was a Calendly backdoor; now routes through the gate
[[redirects]]
  from   = "/book"
  to     = "/audit-quiz.html"
  status = 301

# /audit-quiz pretty URL
[[redirects]]
  from   = "/audit-quiz"
  to     = "/audit-quiz.html"
  status = 200

[[redirects]]
  from   = "/audit"
  to     = "/audit-quiz.html"
  status = 301

# /creators pretty URL
[[redirects]]
  from   = "/creators"
  to     = "/creators.html"
  status = 200

# /pricing pretty URL
[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

# /demo pretty URL → AI team dashboard (SMB)
[[redirects]]
  from   = "/dashboard-demo"
  to     = "/dashboard-demo.html"
  status = 200

# Legacy creator-demo URLs → new dashboard demo
[[redirects]]
  from   = "/creator-demo"
  to     = "/dashboard-demo.html"
  status = 301

[[redirects]]
  from   = "/creator-demo.html"
  to     = "/dashboard-demo.html"
  status = 301

# Backend API endpoints — Netlify Functions
[[redirects]]
  from   = "/api/quiz-submit"
  to     = "/.netlify/functions/quiz-submit"
  status = 200

[[redirects]]
  from   = "/api/stripe-webhook"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200

# Unsubscribe — serves unsubscribe.html (CAN-SPAM compliant opt-out page)
# Query params (?email=...) are preserved automatically by Netlify rewrites.
[[redirects]]
  from   = "/unsubscribe"
  to     = "/unsubscribe.html"
  status = 200

# Onboarding shortlink
[[redirects]]
  from   = "/onboard"
  to     = "/onboarding.html"
  status = 301

[[redirects]]
  from   = "/start"
  to     = "/onboarding.html"
  status = 301

# ─── Security Headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ─── Cache Headers (assets) ───────────────────────────────────────────────────
# Cache fonts and images aggressively (1 year — content-hashed)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS and JS — long cache, immutable once deployed
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — 30 day cache
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML — no cache (always fresh)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

